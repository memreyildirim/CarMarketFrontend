<section class="brand-section">

  <!-- Marka Ekleme Formu -->
  <mat-card class="brand-form-card">
    <h2 class="form-title">Yeni Marka Ekle</h2>
    <mat-form-field appearance="outline" color="primary" class="brand-input">
      <mat-label>Marka Adı</mat-label>
      <mat-icon matPrefix>branding_watermark</mat-icon>
      <input matInput [(ngModel)]="newBrandName" />
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="addBrand()">Ekle</button>
  </mat-card>

  <!-- Marka Tablosu -->
  <mat-card class="brand-table-card">
    <table mat-table [dataSource]="brands" class="custom-table">

      <!-- Marka Adı -->
      <ng-container matColumnDef="brandName">
        <th mat-header-cell *matHeaderCellDef class="custom-header">Marka</th>
        <td mat-cell *matCellDef="let brand">
          <ng-container *ngIf="editingBrandId === brand.id; else readBrand">
            <mat-form-field appearance="fill" class="edit-input">
              <mat-label>Düzenle</mat-label>
              <input matInput [(ngModel)]="editedBrandName" />
            </mat-form-field>
          </ng-container>
          <ng-template #readBrand>{{ brand.brandName }}</ng-template>
        </td>
      </ng-container>

      <!-- İşlem Butonları -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="custom-header">İşlem</th>
        <td mat-cell *matCellDef="let brand">
          <ng-container *ngIf="editingBrandId === brand.id; else defaultButtons">
            <button mat-icon-button color="primary" (click)="updateBrand(brand.id)">
              <mat-icon>check</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="cancelEdit()">
              <mat-icon>close</mat-icon>
            </button>
          </ng-container>

          <ng-template #defaultButtons>
            <button mat-icon-button color="accent" (click)="editBrand(brand.id)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteBrand(brand.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </ng-template>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['brandName', 'actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['brandName', 'actions'];"></tr>
    </table>
  </mat-card>
</section>
