<div class="page-wrapper">

  <div class="filter-panel">
    <h3 class="filter-header">Filters</h3>

    <h4 class="brand-filter-header">Brands</h4>
    <div class="brand-scroll-container">
    <!-- Marka filtreleme -->
      <mat-selection-list [(ngModel)]="selectedBrands" (ngModelChange)="filterByValues()">
        <mat-list-option *ngFor="let brand of brandList" [value]="brand" class="brand">
          {{ brand }}
        </mat-list-option>
      </mat-selection-list>

    </div>
    <div>
      <mat-form-field appearance="outline">
        <mat-label>Min Price</mat-label>
        <input matInput type="number" step="10000" [(ngModel)]="minPrice" (ngModelChange)="filterByValues()" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Max Price</mat-label>
        <input matInput type="number" step="10000" [(ngModel)]="maxPrice" (ngModelChange)="filterByValues()" />
      </mat-form-field>

    </div>
    <div>
      <mat-label> Engine Volume : {{maxEngineVolume}}</mat-label>
      <mat-slider min="0" max="4.5" step="0.1" class="slider-engine">
        <input matSliderThumb [(ngModel)]="maxEngineVolume" (change)="filterByValues()"/>
      </mat-slider>

    </div>
  </div>

  <div class="table-panel">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

    <!-- Photo column -->
    <ng-container matColumnDef="photo">
      <th mat-header-cell *matHeaderCellDef> Photo </th>
      <td mat-cell *matCellDef="let car">
        <img [src]="'http://localhost:10160' + car.filePath"
             width="48" height="32"
             style="object-fit: cover; border-radius: 4px;" />
      </td>
    </ng-container>


    <!-- Marka Kolonu -->
    <ng-container matColumnDef="brand">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Brand</th>
      <td mat-cell *matCellDef="let car">{{ car.brandName }}</td>
    </ng-container>

    <!-- Model Kolonu -->
    <ng-container matColumnDef="model">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Model</th>
      <td mat-cell *matCellDef="let car">{{ car.model }}</td>
    </ng-container>

    <!-- Fiyat Kolonu -->
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
      <td mat-cell *matCellDef="let car">{{ car.price | currency:'TRY' }}</td>
    </ng-container>

    <!-- Eylem -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let car">
        <button mat-button class="viewDetails-button" (click)="carDetails(car.carId)">View Details</button>
      </td>
    </ng-container>

    <!-- Satır Yapısı -->
    <tr mat-header-row class="header-row" *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [length]="dataSource.data.length"
                 [pageSize]="8"
                 showFirstLastButtons>

  </mat-paginator>
  </div>

</div>
